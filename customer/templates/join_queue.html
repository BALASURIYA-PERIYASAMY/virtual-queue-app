{% extends "base.html" %}
{% block content %}
<div class="container mt-5 text-center">
    <h2>Queue Status</h2>
    {% if status %}
        <p class="alert alert-success">You have successfully joined the queue for Shop ID: {{ shop_id }}</p>
    {% else %}
        <p class="alert alert-danger">Failed to join queue. Try again later.</p>
    {% endif %}
    <a href="{{ url_for('customer.dashboard', user_id=1) }}" class="btn btn-secondary mt-3">Back to Dashboard</a>
</div>
{% endblock %}
