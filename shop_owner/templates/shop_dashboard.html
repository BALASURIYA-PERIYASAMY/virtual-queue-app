{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Welcome, {{ shop.name }}</h2>
    <p>Category: {{ shop.category }}</p>

    <h3 class="mt-4">Current Queue</h3>
    <table class="table table-striped mt-2">
        <thead>
            <tr>
                <th>#</th>
                <th>Customer Name</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
        {% for user in queues %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ user.name }}</td>
                <td>{{ user.status }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
