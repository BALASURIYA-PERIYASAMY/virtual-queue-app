{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2>Manage Queue for Shop ID: {{ shop_id }}</h2>
    <ul class="list-group mt-3">
        {% for user in queue %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ user.name }} - {{ user.status }}
            </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
